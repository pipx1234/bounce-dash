<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bounce Dash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      user-select: none;
    }
    #title { color: #7eb8f7; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 6px; }
    #hint  { color: #555; font-size: 0.85rem; margin-bottom: 14px; }
    canvas {
      display: block;
      border: 2px solid #7eb8f7;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(126,184,247,0.2);
    }
  </style>
</head>
<body>
  <div id="title">BOUNCE DASH</div>
  <div id="hint">← → arrow keys &nbsp;·&nbsp; reach as far right as possible</div>
  <canvas id="c" width="800" height="480"></canvas>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 480;

// ── Physics ────────────────────────────────────────────────────────────────
const GRAVITY    = 0.46;
const MAX_FALL   = 16;
const H_ACCEL    = 0.55;
const MAX_H      = 6.5;   // base cap — ramps to MAX_H_BOOST when holding
const MAX_H_BOOST = 14.5; // top speed after full charge
const BOOST_TICKS = 45;   // frames to reach full boost
const H_FRIC     = 0.78;
const BOUNCE     = 0.80;
const MIN_BOUNCE = 13.5;  // guaranteed minimum upward velocity after landing
const BALL_R     = 11;
const PLAT_H     = 14;

// ── World ──────────────────────────────────────────────────────────────────
const CHUNK_W = 650;
const START_X = 200;

let ball, camX, camXTarget, platforms, keys, score, best, state, nextChunk, tick;

// ── Parallax star field (screen-space wrap) ────────────────────────────────
const STARS = Array.from({ length: 90 }, () => ({
  x0:  Math.random() * W,
  y:   Math.random() * H,
  r:   Math.random() * 1.1 + 0.3,
  a:   0.25 + Math.random() * 0.55,
  par: 0.012 + Math.random() * 0.038,
}));

// ── Seeded deterministic RNG (xorshift32) ─────────────────────────────────
function rng(seed) {
  let s = (seed * 1664525 + 1013904223) >>> 0;
  if (s === 0) s = 1;
  return () => {
    s ^= s << 13;
    s ^= s >> 17;
    s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

// ── Platform generation ────────────────────────────────────────────────────
function genChunk(ci) {
  const r     = rng(ci * 9871 + 41537);
  const baseX = 320 + ci * CHUNK_W;
  const diff  = Math.min(ci / 22, 1);
  const count = Math.round(lerp(5, 2, diff));
  const step  = CHUNK_W / count;

  for (let i = 0; i < count; i++) {
    platforms.push({
      x : baseX + i * step + r() * step * 0.55,
      y : 100 + r() * 295,
      w : lerp(195, 52, diff) * (0.7 + r() * 0.6),
      lit: 0,
    });
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  ball       = { x: START_X, y: 330, vx: 0, vy: -12, holdTicks: 0, holdDir: 0 };
  camX       = 0;
  camXTarget = 0;
  tick       = 0;
  score      = 0;
  state      = 'playing';
  keys       = {};

  platforms  = [
    { x:  30, y: 400, w: 340, lit: 0 },
    { x: 420, y: 360, w: 200, lit: 0 },
    { x: 680, y: 310, w: 170, lit: 0 },
  ];

  for (let i = 0; i < 5; i++) genChunk(i);
  nextChunk = 5;

  best = best ?? 0;
}

// ── Collision ──────────────────────────────────────────────────────────────
function resolvePlatforms() {
  for (const p of platforms) {
    if (p.falling) continue;
    if (ball.x + BALL_R < p.x || ball.x - BALL_R > p.x + p.w) continue;
    if (ball.vy <= 0) continue;

    const prevBotY = (ball.y - ball.vy) + BALL_R;
    const curBotY  =  ball.y            + BALL_R;

    if (prevBotY <= p.y && curBotY >= p.y) {
      ball.y     = p.y - BALL_R;
      ball.vy    = -Math.max(Math.abs(ball.vy) * BOUNCE, MIN_BOUNCE);
      p.lit      = 8;
      p.falling  = true;
      p.fallVy   = 1.5;
      p.angle    = 0;
      break;
    }
  }
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  tick++;

  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];

  if (left || right) {
    const dir = right ? 1 : -1;
    // reset charge if direction changed
    if (dir !== ball.holdDir) { ball.holdTicks = 0; ball.holdDir = dir; }
    ball.holdTicks = Math.min(ball.holdTicks + 1, BOOST_TICKS);
  } else {
    ball.holdTicks = Math.max(ball.holdTicks - 3, 0); // bleed off charge when released
    ball.holdDir   = 0;
  }

  const charge   = ball.holdTicks / BOOST_TICKS;          // 0..1
  const dynMaxH  = lerp(MAX_H, MAX_H_BOOST, charge);
  const dynAccel = H_ACCEL * (1 + charge * 1.2);          // accel also ramps

  if (left)            ball.vx = Math.max(ball.vx - dynAccel, -dynMaxH);
  if (right)           ball.vx = Math.min(ball.vx + dynAccel,  dynMaxH);
  if (!left && !right) ball.vx *= H_FRIC;
  if (Math.abs(ball.vx) < 0.05) ball.vx = 0;

  ball.vy = Math.min(ball.vy + GRAVITY, MAX_FALL);
  ball.x += ball.vx;
  ball.y += ball.vy;

  resolvePlatforms();

  const dist = Math.max(0, Math.floor((ball.x - START_X) / 10));
  if (dist > score) score = dist;
  if (score > best)  best  = score;

  camXTarget = ball.x - W * 0.35;
  if (camXTarget < 0) camXTarget = 0;
  camX += (camXTarget - camX) * 0.12;

  while (320 + nextChunk * CHUNK_W < camX + W * 2.5) genChunk(nextChunk++);

  // Animate falling platforms
  for (const p of platforms) {
    if (p.falling) {
      p.fallVy += 0.35;
      p.y      += p.fallVy;
      p.angle  += 0.03;
    }
  }

  if (platforms.length > 300)
    platforms = platforms.filter(p => p.x + p.w > camX - 300 && p.y < H + 120);

  for (const p of platforms) if (p.lit > 0) p.lit--;

  if (ball.y - BALL_R > H + 20) state = 'over';
}

// ── Drawing helpers ────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h,     x, y + h - r,     r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y,         x + r, y,         r);
  ctx.closePath();
}

// ── Render ─────────────────────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#08081a');
  g.addColorStop(1, '#0d1530');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars with slow parallax (wrap within screen width)
  for (const s of STARS) {
    const sx = ((s.x0 - camX * s.par) % W + W) % W;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Danger fog at bottom edge
  const fogG = ctx.createLinearGradient(0, H - 60, 0, H);
  fogG.addColorStop(0, 'rgba(180, 20, 20, 0)');
  fogG.addColorStop(1, 'rgba(180, 20, 20, 0.35)');
  ctx.fillStyle = fogG;
  ctx.fillRect(0, H - 60, W, 60);
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - camX;
    if (sx + p.w < -20 || sx > W + 20) continue;

    const diff  = Math.min((p.x - 320) / (22 * CHUNK_W), 1);
    const baseR = Math.round(lerp(60,  230, diff));
    const baseG = Math.round(lerp(200,  55, diff));
    const baseB = Math.round(lerp(90,   75, diff));

    const flash = p.lit / 8;
    if (flash > 0) {
      ctx.fillStyle = `rgb(
        ${Math.round(lerp(baseR, 255, flash))},
        ${Math.round(lerp(baseG, 235, flash))},
        ${Math.round(lerp(baseB, 100, flash))}
      )`;
    } else {
      ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
    }

    if (p.falling) {
      const alpha = Math.max(0, 1 - p.fallVy / 16);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx + p.w / 2, p.y + PLAT_H / 2);
      ctx.rotate(p.angle);
      roundRect(-p.w / 2, -PLAT_H / 2, p.w, PLAT_H, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(-p.w / 2 + 5, -PLAT_H / 2 + 2, p.w - 10, 3);
      ctx.restore();
    } else {
      roundRect(sx, p.y, p.w, PLAT_H, 4);
      ctx.fill();
      // Highlight stripe
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(sx + 5, p.y + 2, p.w - 10, 3);
    }
  }
}

function drawBall() {
  const bx = ball.x - camX;
  const by = ball.y;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(bx, by + BALL_R + 2, BALL_R * 0.85, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const charge = ball.holdTicks / BOOST_TICKS;

  // Glow — shifts from blue to orange as charge builds
  const glowR = Math.round(lerp(126, 255, charge));
  const glowG = Math.round(lerp(184, 140, charge));
  const glowB = Math.round(lerp(247,  30, charge));
  const halo = ctx.createRadialGradient(bx, by, 0, bx, by, BALL_R * (2.2 + charge * 1.4));
  halo.addColorStop(0, `rgba(${glowR},${glowG},${glowB},${0.35 + charge * 0.4})`);
  halo.addColorStop(1, `rgba(${glowR},${glowG},${glowB},0)`);
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R * (2.2 + charge * 1.4), 0, Math.PI * 2);
  ctx.fill();

  // Ball body — tints towards orange at full charge
  const bg = ctx.createRadialGradient(bx - 3, by - 3, 1, bx, by, BALL_R);
  bg.addColorStop(0, '#e9f5ff');
  bg.addColorStop(1, `rgb(${Math.round(lerp(90, 255, charge))},${Math.round(lerp(174, 110, charge))},${Math.round(lerp(245, 20, charge))}`);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // Charge arc above ball
  if (charge > 0.05) {
    ctx.save();
    ctx.strokeStyle = `rgba(${glowR},${glowG},${glowB},${0.5 + charge * 0.5})`;
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.arc(bx, by, BALL_R + 7, Math.PI + Math.PI * (1 - charge), Math.PI * 2 - Math.PI * (1 - charge));
    ctx.stroke();
    ctx.restore();
  }
}

function drawHUD() {
  // Score panel
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(10, 10, 200, 60, 6);
  ctx.fill();

  ctx.fillStyle = '#7eb8f7';
  ctx.font = 'bold 15px "Segoe UI", Arial';
  ctx.fillText(`Distance:  ${score} m`, 22, 32);

  ctx.fillStyle = '#7a8fa0';
  ctx.font = '13px "Segoe UI", Arial';
  ctx.fillText(`Best: ${best} m`, 22, 55);

  // Danger vignette at high scores
  if (score > 150) {
    const intensity = Math.min((score - 150) / 450, 1) * 0.2;
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.055);
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(200,30,30,${intensity * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 54px "Segoe UI", Arial';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 65);

  ctx.fillStyle = '#7eb8f7';
  ctx.font = 'bold 30px "Segoe UI", Arial';
  ctx.fillText(`${score} m reached`, W / 2, H / 2 - 8);

  ctx.fillStyle = '#7a8fa0';
  ctx.font = '18px "Segoe UI", Arial';
  ctx.fillText(`Best: ${best} m`, W / 2, H / 2 + 28);

  ctx.fillStyle = '#cccccc';
  ctx.font = '16px "Segoe UI", Arial';
  ctx.fillText('Press Space or Enter to play again', W / 2, H / 2 + 72);

  ctx.textAlign = 'left';
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  update();
  drawBg();
  drawPlatforms();
  drawBall();
  drawHUD();
  if (state === 'over') drawGameOver();
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && state === 'over') init();
  if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Start ──────────────────────────────────────────────────────────────────
best = 0;
init();
camX = camXTarget; // snap camera on first frame
loop();
</script>
</body>
</html>
