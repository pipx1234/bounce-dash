<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bounce Dash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      user-select: none;
    }
    #title { color: #7eb8f7; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 6px; }
    #hint  { color: #555; font-size: 0.85rem; margin-bottom: 14px; }
    canvas {
      display: block;
      border: 2px solid #7eb8f7;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(126,184,247,0.2);
    }
  </style>
</head>
<body>
  <div id="title">BOUNCE DASH</div>
  <div id="hint">← → arrow keys &nbsp;·&nbsp; reach as far right as possible</div>
  <canvas id="c" width="800" height="480"></canvas>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 480;

// ── Level definitions ──────────────────────────────────────────────────────
const LEVELS = [
  {
    name: 'SPACE STATION',
    bgTop: '#08081a', bgBot: '#0d1530',
    starR: 255, starG: 255, starB: 255,
    fogR:  180, fogG:  20,  fogB:  20,
    platA: [60,  200,  90], platB: [230,  55,  75],
    countMax: 5, countMin: 3, wMax: 190, wMin: 75,
  },
  {
    name: 'NEON CITY',
    bgTop: '#0a001f', bgBot: '#15002a',
    starR: 255, starG: 100, starB: 255,
    fogR:  180, fogG:   0,  fogB: 220,
    platA: [0,   220, 220], platB: [255,   0, 200],
    countMax: 4, countMin: 2, wMax: 170, wMin: 65,
  },
  {
    name: 'VOLCANIC RIDGE',
    bgTop: '#150200', bgBot: '#280600',
    starR: 255, starG: 140, starB:  20,
    fogR:  220, fogG:  60,  fogB:   0,
    platA: [220, 100,  20], platB: [255,  30,   0],
    countMax: 4, countMin: 2, wMax: 155, wMin: 58,
  },
  {
    name: 'FROZEN PEAKS',
    bgTop: '#000d1a', bgBot: '#001528',
    starR: 150, starG: 220, starB: 255,
    fogR:    0, fogG: 120,  fogB: 200,
    platA: [100, 200, 240], platB: [180, 230, 255],
    countMax: 3, countMin: 2, wMax: 140, wMin: 52,
  },
  {
    name: 'THE VOID',
    bgTop: '#000000', bgBot: '#050008',
    starR: 140, starG:   0, starB: 255,
    fogR:  100, fogG:   0,  fogB: 200,
    platA: [130,   0, 220], platB: [ 80,   0, 160],
    countMax: 3, countMin: 2, wMax: 120, wMin: 45,
  },
];

// ── Physics ────────────────────────────────────────────────────────────────
const GRAVITY     = 0.46;
const MAX_FALL    = 16;
const H_ACCEL     = 0.55;
const MAX_H       = 6.5;
const MAX_H_BOOST = 14.5;
const BOOST_TICKS = 45;
const H_FRIC      = 0.78;
const BOUNCE      = 0.80;
const MIN_BOUNCE  = 13.5;
const BALL_R      = 11;
const PLAT_H      = 14;

// ── World ──────────────────────────────────────────────────────────────────
const CHUNK_W     = 650;
const START_X     = 200;
const LEVEL_CHUNKS = 6;   // chunks per level

let ball, camX, camXTarget, platforms, keys, score, best, state, nextChunk, tick;
let currentLevel, levelStartX, levelEndX, levelChunkOffset, levelTransTick;

// ── Parallax star field (screen-space wrap) ────────────────────────────────
const STARS = Array.from({ length: 90 }, () => ({
  x0:  Math.random() * W,
  y:   Math.random() * H,
  r:   Math.random() * 1.1 + 0.3,
  a:   0.25 + Math.random() * 0.55,
  par: 0.012 + Math.random() * 0.038,
}));

// ── Seeded deterministic RNG (xorshift32) ─────────────────────────────────
function rng(seed) {
  let s = (seed * 1664525 + 1013904223) >>> 0;
  if (s === 0) s = 1;
  return () => {
    s ^= s << 13;
    s ^= s >> 17;
    s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

// ── Platform generation ────────────────────────────────────────────────────
function genChunk(ci) {
  const lv    = LEVELS[currentLevel];
  const r     = rng(ci * 9871 + 41537);
  const local = ci - levelChunkOffset;
  const baseX = levelStartX + 320 + local * CHUNK_W;
  const t     = Math.min(local / Math.max(LEVEL_CHUNKS - 1, 1), 1);
  const count = Math.round(lerp(lv.countMax, lv.countMin, t));
  const step  = CHUNK_W / count;

  for (let i = 0; i < count; i++) {
    platforms.push({
      x:     baseX + i * step + r() * step * 0.55,
      y:     100 + r() * 295,
      w:     lerp(lv.wMax, lv.wMin, t) * (0.7 + r() * 0.6),
      t,
      level: currentLevel,
      lit:   0,
    });
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  ball             = { x: START_X, y: 330, vx: 0, vy: -12, holdTicks: 0, holdDir: 0 };
  camX             = 0;
  camXTarget       = 0;
  tick             = 0;
  score            = 0;
  state            = 'playing';
  keys             = {};
  currentLevel     = 0;
  levelStartX      = START_X;
  levelChunkOffset = 0;
  levelEndX        = START_X + LEVEL_CHUNKS * CHUNK_W;
  levelTransTick   = 0;

  platforms = [
    { x:  30, y: 400, w: 340, t: 0, level: 0, lit: 0 },
    { x: 420, y: 360, w: 200, t: 0, level: 0, lit: 0 },
    { x: 680, y: 310, w: 170, t: 0, level: 0, lit: 0 },
  ];

  for (let i = 0; i < 5; i++) genChunk(i);
  nextChunk = 5;

  best = best ?? 0;
}

// ── Advance to next level ──────────────────────────────────────────────────
function advanceLevel() {
  currentLevel     = Math.min(currentLevel + 1, LEVELS.length - 1);
  levelStartX      = ball.x;
  levelChunkOffset = nextChunk;
  levelEndX        = (currentLevel < LEVELS.length - 1)
                       ? levelStartX + LEVEL_CHUNKS * CHUNK_W
                       : Infinity;
  state            = 'playing';
  levelTransTick   = 0;

  // Keep platforms that are still ahead; drop fallen ones
  platforms = platforms.filter(p => !p.falling && p.x + p.w > camX - 200);

  // Safe landing platform just ahead
  platforms.push({ x: ball.x + 100, y: ball.y + 80, w: 280, t: 0, level: currentLevel, lit: 0 });

  for (let i = 0; i < 5; i++) genChunk(levelChunkOffset + i);
  nextChunk = levelChunkOffset + 5;
}

// ── Collision ──────────────────────────────────────────────────────────────
function resolvePlatforms() {
  for (const p of platforms) {
    if (p.falling) continue;
    if (ball.x + BALL_R < p.x || ball.x - BALL_R > p.x + p.w) continue;
    if (ball.vy <= 0) continue;

    const prevBotY = (ball.y - ball.vy) + BALL_R;
    const curBotY  =  ball.y            + BALL_R;

    if (prevBotY <= p.y && curBotY >= p.y) {
      ball.y    = p.y - BALL_R;
      ball.vy   = -Math.max(Math.abs(ball.vy) * BOUNCE, MIN_BOUNCE);
      p.lit     = 8;
      p.falling = true;
      p.fallVy  = 1.5;
      p.angle   = 0;
      break;
    }
  }
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  // During level-complete screen keep ball physics going visually
  if (state === 'levelcomplete') {
    levelTransTick++;
    ball.vy = Math.min(ball.vy + GRAVITY, MAX_FALL);
    ball.x += ball.vx;
    ball.y += ball.vy;
    resolvePlatforms();
    for (const p of platforms) {
      if (p.falling) { p.fallVy += 0.35; p.y += p.fallVy; p.angle += 0.03; }
    }
    camX += (ball.x - W * 0.35 - camX) * 0.12;
    if (levelTransTick >= 150) advanceLevel();
    return;
  }

  if (state !== 'playing') return;
  tick++;

  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];

  if (left || right) {
    const dir = right ? 1 : -1;
    if (dir !== ball.holdDir) { ball.holdTicks = 0; ball.holdDir = dir; }
    ball.holdTicks = Math.min(ball.holdTicks + 1, BOOST_TICKS);
  } else {
    ball.holdTicks = Math.max(ball.holdTicks - 3, 0);
    ball.holdDir   = 0;
  }

  const charge   = ball.holdTicks / BOOST_TICKS;
  const dynMaxH  = lerp(MAX_H, MAX_H_BOOST, charge);
  const dynAccel = H_ACCEL * (1 + charge * 1.2);

  if (left)            ball.vx = Math.max(ball.vx - dynAccel, -dynMaxH);
  if (right)           ball.vx = Math.min(ball.vx + dynAccel,  dynMaxH);
  if (!left && !right) ball.vx *= H_FRIC;
  if (Math.abs(ball.vx) < 0.05) ball.vx = 0;

  ball.vy = Math.min(ball.vy + GRAVITY, MAX_FALL);
  ball.x += ball.vx;
  ball.y += ball.vy;

  resolvePlatforms();

  const dist = Math.max(0, Math.floor((ball.x - START_X) / 10));
  if (dist > score) score = dist;
  if (score > best)  best  = score;

  camXTarget = ball.x - W * 0.35;
  if (camXTarget < 0) camXTarget = 0;
  camX += (camXTarget - camX) * 0.12;

  // Generate chunks ahead (unlimited on last level)
  const isLastLevel = currentLevel === LEVELS.length - 1;
  while (
    (isLastLevel || nextChunk - levelChunkOffset < LEVEL_CHUNKS) &&
    levelStartX + 320 + (nextChunk - levelChunkOffset) * CHUNK_W < camX + W * 2.5
  ) {
    genChunk(nextChunk++);
  }

  for (const p of platforms) {
    if (p.falling) { p.fallVy += 0.35; p.y += p.fallVy; p.angle += 0.03; }
  }

  if (platforms.length > 300)
    platforms = platforms.filter(p => p.x + p.w > camX - 300 && p.y < H + 120);

  for (const p of platforms) if (p.lit > 0) p.lit--;

  // Level complete check (not on last level)
  if (ball.x >= levelEndX && currentLevel < LEVELS.length - 1) {
    state          = 'levelcomplete';
    levelTransTick = 0;
  }

  if (ball.y - BALL_R > H + 20) state = 'over';
}

// ── Drawing helpers ────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h,     x, y + h - r,     r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y,         x + r, y,         r);
  ctx.closePath();
}

// ── Render ─────────────────────────────────────────────────────────────────
function drawBg() {
  const lv = LEVELS[currentLevel];
  const g  = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, lv.bgTop);
  g.addColorStop(1, lv.bgBot);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (const s of STARS) {
    const sx = ((s.x0 - camX * s.par) % W + W) % W;
    ctx.globalAlpha = s.a;
    ctx.fillStyle   = `rgb(${lv.starR},${lv.starG},${lv.starB})`;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  const fogG = ctx.createLinearGradient(0, H - 60, 0, H);
  fogG.addColorStop(0, `rgba(${lv.fogR},${lv.fogG},${lv.fogB},0)`);
  fogG.addColorStop(1, `rgba(${lv.fogR},${lv.fogG},${lv.fogB},0.4)`);
  ctx.fillStyle = fogG;
  ctx.fillRect(0, H - 60, W, 60);
}

function drawFinishGate() {
  if (currentLevel >= LEVELS.length - 1) return;
  const gx = levelEndX - camX;
  if (gx < -20 || gx > W + 20) return;

  const lv    = LEVELS[currentLevel];
  const pulse = 0.65 + 0.35 * Math.sin(tick * 0.09);

  ctx.save();
  // Wide soft beam
  const beam = ctx.createLinearGradient(gx - 18, 0, gx + 18, 0);
  beam.addColorStop(0,   'rgba(255,255,255,0)');
  beam.addColorStop(0.5, `rgba(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]},${0.55 * pulse})`);
  beam.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = beam;
  ctx.fillRect(gx - 18, 0, 36, H);

  // Bright centre line
  ctx.globalAlpha  = 0.85 * pulse;
  ctx.strokeStyle  = `rgb(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]})`;
  ctx.lineWidth    = 2;
  ctx.beginPath();
  ctx.moveTo(gx, 0); ctx.lineTo(gx, H);
  ctx.stroke();

  // Label
  ctx.globalAlpha = pulse;
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 11px "Segoe UI", Arial';
  ctx.textAlign   = 'center';
  ctx.fillText('FINISH', gx, 20);
  ctx.textAlign   = 'left';
  ctx.restore();
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - camX;
    if (sx + p.w < -20 || sx > W + 20) continue;

    const lv    = LEVELS[p.level ?? 0];
    const baseR = Math.round(lerp(lv.platA[0], lv.platB[0], p.t));
    const baseG = Math.round(lerp(lv.platA[1], lv.platB[1], p.t));
    const baseB = Math.round(lerp(lv.platA[2], lv.platB[2], p.t));

    const flash = (p.lit || 0) / 8;
    ctx.fillStyle = flash > 0
      ? `rgb(${Math.round(lerp(baseR,255,flash))},${Math.round(lerp(baseG,235,flash))},${Math.round(lerp(baseB,100,flash))})`
      : `rgb(${baseR},${baseG},${baseB})`;

    if (p.falling) {
      const alpha = Math.max(0, 1 - p.fallVy / 16);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx + p.w / 2, p.y + PLAT_H / 2);
      ctx.rotate(p.angle);
      roundRect(-p.w / 2, -PLAT_H / 2, p.w, PLAT_H, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(-p.w / 2 + 5, -PLAT_H / 2 + 2, p.w - 10, 3);
      ctx.restore();
    } else {
      roundRect(sx, p.y, p.w, PLAT_H, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(sx + 5, p.y + 2, p.w - 10, 3);
    }
  }
}

function drawBall() {
  const bx = ball.x - camX;
  const by = ball.y;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(bx, by + BALL_R + 2, BALL_R * 0.85, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const charge = ball.holdTicks / BOOST_TICKS;
  const glowR  = Math.round(lerp(126, 255, charge));
  const glowG  = Math.round(lerp(184, 140, charge));
  const glowB  = Math.round(lerp(247,  30, charge));

  const halo = ctx.createRadialGradient(bx, by, 0, bx, by, BALL_R * (2.2 + charge * 1.4));
  halo.addColorStop(0, `rgba(${glowR},${glowG},${glowB},${0.35 + charge * 0.4})`);
  halo.addColorStop(1, `rgba(${glowR},${glowG},${glowB},0)`);
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R * (2.2 + charge * 1.4), 0, Math.PI * 2);
  ctx.fill();

  const bg = ctx.createRadialGradient(bx - 3, by - 3, 1, bx, by, BALL_R);
  bg.addColorStop(0, '#e9f5ff');
  bg.addColorStop(1, `rgb(${Math.round(lerp(90, 255, charge))},${Math.round(lerp(174, 110, charge))},${Math.round(lerp(245, 20, charge))}`);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  if (charge > 0.05) {
    ctx.save();
    ctx.strokeStyle = `rgba(${glowR},${glowG},${glowB},${0.5 + charge * 0.5})`;
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.arc(bx, by, BALL_R + 7, Math.PI + Math.PI * (1 - charge), Math.PI * 2 - Math.PI * (1 - charge));
    ctx.stroke();
    ctx.restore();
  }
}

function drawHUD() {
  const lv   = LEVELS[currentLevel];
  const isLast = currentLevel === LEVELS.length - 1;

  // Panel
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(10, 10, 215, 80, 6);
  ctx.fill();

  ctx.fillStyle = '#7eb8f7';
  ctx.font = 'bold 15px "Segoe UI", Arial';
  ctx.fillText(`Distance:  ${score} m`, 22, 32);

  ctx.fillStyle = '#7a8fa0';
  ctx.font = '13px "Segoe UI", Arial';
  ctx.fillText(`Best: ${best} m`, 22, 52);

  ctx.fillStyle = `rgb(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]})`;
  ctx.font = 'bold 11px "Segoe UI", Arial';
  ctx.fillText(`LVL ${currentLevel + 1}  ·  ${lv.name}`, 22, 70);

  // Level progress bar (hidden on last level — it's endless)
  if (!isLast) {
    const prog  = Math.min((ball.x - levelStartX) / (LEVEL_CHUNKS * CHUNK_W), 1);
    const barX  = 10, barY = 84, barW = 215, barH = 5;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(barX, barY, barW, barH, 2); ctx.fill();
    ctx.fillStyle = `rgb(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]})`;
    roundRect(barX, barY, barW * prog, barH, 2); ctx.fill();
  }

  // Danger vignette
  if (score > 150) {
    const intensity = Math.min((score - 150) / 450, 1) * 0.2;
    const pulse     = 0.5 + 0.5 * Math.sin(tick * 0.055);
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(${lv.fogR},${lv.fogG},${lv.fogB},${intensity * pulse})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawLevelComplete() {
  const lv   = LEVELS[currentLevel];
  const next = LEVELS[currentLevel + 1];
  const t    = Math.min(levelTransTick / 25, 1); // fade in

  ctx.save();
  ctx.globalAlpha = 0.72 * t;
  ctx.fillStyle   = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = t;
  ctx.textAlign   = 'center';

  ctx.fillStyle = `rgb(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]})`;
  ctx.font      = 'bold 52px "Segoe UI", Arial';
  ctx.fillText('LEVEL COMPLETE!', W / 2, H / 2 - 72);

  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 24px "Segoe UI", Arial';
  ctx.fillText(lv.name, W / 2, H / 2 - 30);

  ctx.fillStyle = '#888';
  ctx.font      = '16px "Segoe UI", Arial';
  ctx.fillText(`${score} m`, W / 2, H / 2 + 10);

  if (next) {
    ctx.fillStyle = '#cccccc';
    ctx.font      = '17px "Segoe UI", Arial';
    ctx.fillText(`Next: ${next.name}`, W / 2, H / 2 + 46);
  }

  const secsLeft = Math.max(1, Math.ceil((150 - levelTransTick) / 60));
  ctx.fillStyle = '#555';
  ctx.font      = '13px "Segoe UI", Arial';
  ctx.fillText(`Auto-advancing in ${secsLeft}s  ·  Space to skip`, W / 2, H / 2 + 80);

  ctx.textAlign = 'left';
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 52px "Segoe UI", Arial';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 72);

  ctx.fillStyle = '#7eb8f7';
  ctx.font = 'bold 28px "Segoe UI", Arial';
  ctx.fillText(`${score} m reached`, W / 2, H / 2 - 20);

  const lv = LEVELS[currentLevel];
  ctx.fillStyle = `rgb(${lv.platA[0]},${lv.platA[1]},${lv.platA[2]})`;
  ctx.font = '17px "Segoe UI", Arial';
  ctx.fillText(`Level ${currentLevel + 1}: ${lv.name}`, W / 2, H / 2 + 14);

  ctx.fillStyle = '#7a8fa0';
  ctx.font = '16px "Segoe UI", Arial';
  ctx.fillText(`Best: ${best} m`, W / 2, H / 2 + 46);

  ctx.fillStyle = '#cccccc';
  ctx.font = '16px "Segoe UI", Arial';
  ctx.fillText('Press Space or Enter to play again', W / 2, H / 2 + 80);

  ctx.textAlign = 'left';
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  update();
  drawBg();
  drawFinishGate();
  drawPlatforms();
  drawBall();
  drawHUD();
  if (state === 'levelcomplete') drawLevelComplete();
  if (state === 'over')          drawGameOver();
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && state === 'over')          init();
  if ((e.key === ' ' || e.key === 'Enter') && state === 'levelcomplete') advanceLevel();
  if ([' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ── Start ──────────────────────────────────────────────────────────────────
best = 0;
init();
camX = camXTarget; // snap camera on first frame
loop();
</script>
